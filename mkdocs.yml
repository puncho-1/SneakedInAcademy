site_name: Sneaked In Academy Guides
site_description: Guides and resources for EVE Online players
site_author: Sneaked In
site_url: https://puncho-1.github.io/SneakedInAcademy/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: blue
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md

  - Industry:
      - Basics: industry/index.md
      - Mining:
          - Basics: industry/mining/mining-basics.md
          - Ores: industry/mining/ores.md
          - Ice: industry/mining/ice.md
          - Gas: industry/mining/gas.md
      - Production:
          - Basics: production/index.md
      - Research:
          - Basics: research/index.md
      - Planetary Interaction:
          - Basics: planetary-interaction/index.md
      - Reactions: industry/reactions.md

  - Ships:
      - Overview: ships/index.md
      - Frigates & Destroyers:
          - Kikimora: ships/frigates-destroyers/kikimora.md
      - Beginner Cruisers:
          - Caracal: ships/beginner-cruisers/caracal.md
          - Rupture: ships/beginner-cruisers/rupture.md
      - Advanced:
          - Eagle: ships/advanced/eagle.md
      - Support:
          - T1 Logistics: ships/support/t1-logistics.md

  - Fitting:
      - Overview: fittings/index.md
      - Frigates: fittings/frigates.md
      - Destroyers: fittings/destroyers.md
      - Cruisers: fittings/cruisers.md
      - Battleships: fittings/battleships.md
      - Logistics: fittings/logistics.md
      - Abyss: fittings/abyss.md

  - Faction-Warfare:
      - Overview: faction-warfare/index.md
      - Basics: faction-warfare/fw-basics.md

  - Missions:
      - Overview: missions/index.md
      - Security: missions/security.md
      - Mining: missions/mining.md
      - Distribution: missions/distribution.md
      - Epic Arcs: missions/epic-arcs.md

  - Abyss:
      - Overview: abyss/index.md
      - Basics: abyss/abyss-basics.md
      - Rupture: abyss/rupture.md
      - Gila T4: abyss/gila-t4.md

  - Links:
      - Overview: links/index.md
      - Maps: links/maps.md
      - Market: links/market.md
      - Fitting Tools: links/fitting-tools.md
      - Killboards: links/killboards.md
      - Forums: links/forums.md
      - Discord: links/discord.md
      - Resources: links/resources.md
      - Calculators: links/calculators.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css