site_name: Sneaked In Academy Guides
site_description: Guides and resources for EVE Online players
site_author: Sneaked In
site_url: https://puncho-1.github.io/SneakedInAcademy/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: blue
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md

  - Industry:
      - Overview: industry/index.md
      - Basics: industry/industry-basics.md
      - Mining:
          - Basics: mining/mining-basics.md
      - Production:
          - Basics: production/production-basics.md
      - Research:
          - Basics: research/research-basics.md
      - Planetary Interaction:
          - Basics: planetary-interaction/pi-basics.md
      - Reactions: industry/reactions.md

  - Ships:
      - Overview: ships/index.md
      - Frigates & Destroyers:
          - Overview: ships/frigates-destroyers/overview.md
          - Kikimora: ships/frigates-destroyers/kikimora.md
      - Beginner Cruisers:
          - Overview: ships/beginner-cruisers/overview.md
          - Caracal: ships/beginner-cruisers/caracal.md
          - Rupture: ships/beginner-cruisers/rupture.md
      - Advanced:
          - Eagle: ships/advanced/eagle.md
      - Support:
          - T1 Logistics: ships/support/t1-logistics.md

  - Fitting:
      - Overview: fittings/index.md
      - Basics: fittings/fitting-basics.md

  - Faction-Warfare:
      - Overview: faction-warfare/index.md
      - Basics: faction-warfare/fw-basics.md

  - Missions:
      - Overview: missions/index.md
      - Basics: missions/missions-basics.md

  - Abyss:
      - Overview: abyss/index.md
      - Basics: abyss/abyss-basics.md
      - Gila T4: abyss/gila-t4.md

  - Links:
      - Overview: links/index.md
      - Tools: links/tools.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css